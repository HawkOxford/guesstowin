
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTW Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --green:#00e676; --bg:#0a0f0a; --card:#141c14; --border:#1f2e1f; --text:#e8f5e9; --muted:#6a7d6a; --amber:#ffa726; --red:#ef5350; --gold:#ffd54f; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:sans-serif; min-height:100vh; }
  .lock { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
  .lock-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:2rem; width:100%; max-width:300px; text-align:center; }
  .lock-title { font-size:1.3rem; font-weight:900; margin-bottom:1.2rem; }
  .lock-title span { color:var(--green); }
  .pin { width:100%; background:#1a231a; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.95rem; padding:0.65rem; margin-bottom:0.6rem; outline:none; text-align:center; }
  .pin:focus { border-color:var(--green); }
  .pin.code { letter-spacing:0.3em; font-size:1.1rem; }
  .lock-btn { width:100%; background:var(--green); color:#031a03; border:none; border-radius:6px; padding:0.75rem; font-weight:700; font-size:0.95rem; cursor:pointer; margin-top:0.4rem; }
  .lock-err { font-size:0.72rem; color:var(--red); margin-top:0.75rem; display:none; }
  .dash { padding:1.5rem; max-width:700px; margin:0 auto; }
  .top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem; flex-wrap:wrap; gap:0.75rem; }
  .title { font-size:1.6rem; font-weight:900; }
  .title span { color:var(--green); }
  .subtitle { font-size:0.7rem; color:var(--muted); margin-top:3px; }
  .controls { display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; }
  .gw-select { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:0.35rem 0.75rem; font-size:0.8rem; outline:none; cursor:pointer; }
  .gw-select:focus { border-color:var(--green); }
  .refresh { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:0.35rem 0.9rem; font-size:0.72rem; cursor:pointer; }
  .refresh:hover { border-color:var(--green); color:var(--green); }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1.5rem; }
  .panel-header { display:flex; justify-content:space-between; align-items:center; padding:0.85rem 1rem; border-bottom:1px solid var(--border); }
  .panel-title { font-size:0.6rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--green); }
  .panel-meta { font-size:0.7rem; color:var(--muted); }
  .row { display:flex; justify-content:space-between; align-items:center; padding:0.65rem 1rem; border-bottom:1px solid rgba(31,46,31,0.5); }
  .row:last-child { border-bottom:none; }
  .player-name { font-weight:500; font-size:0.88rem; }
  .badges { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .b { font-size:0.6rem; font-weight:700; border-radius:3px; padding:2px 7px; letter-spacing:0.04em; white-space:nowrap; }
  .b-green { background:rgba(0,230,118,0.12); color:var(--green); }
  .b-amber { background:rgba(255,167,38,0.1); color:var(--amber); }
  .b-red { background:rgba(239,83,80,0.1); color:var(--red); }
  .b-muted { background:rgba(106,125,106,0.12); color:var(--muted); }
  .spinner { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:2rem auto; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .progress-bar { height:4px; background:var(--border); margin:0 1rem 0.75rem; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.4s; }
</style>
</head>
<body>

<div id="lock" class="lock">
  <div class="lock-card">
    <div class="lock-title">GTW <span>Admin</span></div>
    <input class="pin code" type="password" id="pin" placeholder="PIN">
    <input class="pin" type="email" id="admin-email" placeholder="Your email">
    <input class="pin" type="password" id="admin-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">Sign In</button>
    <div class="lock-err" id="lock-err">Incorrect PIN or login failed</div>
  </div>
</div>

<div id="dash" class="dash" style="display:none">
  <div class="top">
    <div>
      <div class="title">GTW <span>Admin</span></div>
      <div class="subtitle" id="subtitle">Loading…</div>
    </div>
    <div class="controls">
      <select class="gw-select" id="gw-select" onchange="renderForGW(this.value)">
        <option>Loading…</option>
      </select>
      <button class="refresh" onclick="load()">↻ Refresh</button>
    </div>
  </div>
  <div id="content"><div class="spinner"></div></div>
</div>

<script>
const SUPABASE_URL = 'https://iufbdwsmbwrtcqzkvyey.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1ZmJkd3NtYndydGNxemt2eWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTg2MzcsImV4cCI6MjA5MDE5NDYzN30.Q3B-7qr4xWcGpa1UJWKSAd1iu6_-WHaiDcPV4HJ8SNk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PLAYERS = ['Jake','Glurk','Josh ⭐','Richard ⭐','Teflon','Alex','Gaz ⭐','Liam','Craig','Marcus'];

let allPreds = [];
let profileMap = {};
let totalFixtures = 8;
let availableGWs = [];

async function unlock() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-pass').value;
  if (!email || !password) { document.getElementById('lock-err').style.display = 'block'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('lock-err').textContent = 'Login failed: ' + error.message;
    document.getElementById('lock-err').style.display = 'block';
    return;
  }
  document.getElementById('lock').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  load();
}

async function load() {
  document.getElementById('content').innerHTML = '<div class="spinner"></div>';

  const [{ data: profiles }, { data: preds }] = await Promise.all([
    sb.from('profiles').select('id,player_name'),
    sb.from('predictions').select('user_id,gameweek,match_key,home_score,away_score')
  ]);

  profileMap = {};
  (profiles||[]).forEach(p => profileMap[p.id] = p.player_name);
  allPreds = preds || [];

  // Get all GWs that have predictions, sorted descending
  availableGWs = [...new Set(allPreds.map(p => p.gameweek))].sort((a,b) => b-a);

  // Fetch fixture count from API
  try {
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://api.football-data.org/v4/competitions/PL/matches?status=SCHEDULED,TIMED');
    const apiRes = await fetch(proxyUrl, {headers:{'X-Auth-Token':'06f21e4fcbf44c9984aa595874172fa2'}});
    if (apiRes.ok) {
      const matches = (await apiRes.json()).matches || [];
      const now = new Date();
      const upcoming = matches.filter(m => {
        const d = new Date(m.utcDate);
        if (d <= now) return false;
        const day = d.toLocaleDateString('en-GB',{timeZone:'Europe/London',weekday:'long'});
        return day === 'Saturday' || day === 'Sunday';
      }).sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate));
      if (upcoming.length) {
        const firstD = new Date(upcoming[0].utcDate);
        const dayName = firstD.toLocaleDateString('en-GB',{timeZone:'Europe/London',weekday:'long'});
        const satDate = new Date(firstD);
        if (dayName === 'Sunday') satDate.setUTCDate(satDate.getUTCDate()-1);
        const sunDate = new Date(satDate);
        sunDate.setUTCDate(satDate.getUTCDate()+1);
        const satStr = satDate.toISOString().slice(0,10);
        const sunStr = sunDate.toISOString().slice(0,10);
        const weekend = upcoming.filter(m => {
          const d = m.utcDate.slice(0,10);
          return d === satStr || d === sunStr;
        });
        totalFixtures = weekend.length || 8;
      }
    }
  } catch(e) {}

  // Build GW dropdown
  const sel = document.getElementById('gw-select');
  sel.innerHTML = '';
  if (availableGWs.length) {
    availableGWs.forEach(gw => {
      const opt = document.createElement('option');
      opt.value = gw;
      opt.textContent = `GW${gw}`;
      sel.appendChild(opt);
    });
    // Add current/upcoming GW if not already in list
    const currentGW = availableGWs[0] + (availableGWs[0] === availableGWs[0] ? 0 : 1);
    sel.value = availableGWs[0];
  } else {
    const opt = document.createElement('option');
    opt.value = 27;
    opt.textContent = 'GW27';
    sel.appendChild(opt);
  }

  const now = new Date();
  document.getElementById('subtitle').textContent = now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}) + ' · ' + now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  renderForGW(sel.value);
}

function renderForGW(gw) {
  gw = parseInt(gw);
  const gwPreds = allPreds.filter(p => p.gameweek === gw);

  // Count predictions per player for this GW
  const submissionMap = {};
  gwPreds.forEach(p => {
    const name = profileMap[p.user_id];
    if (!name) return;
    submissionMap[name] = (submissionMap[name]||0) + 1;
  });

  const submittedCount = PLAYERS.filter(n => (submissionMap[n]||0) > 0).length;
  const pct = Math.round((submittedCount / PLAYERS.length) * 100);

  // For current/future GW use API fixture count, for past use max submitted
  const maxSubmitted = Math.max(...Object.values(submissionMap).concat([0]));
  const fixtureCount = gw === parseInt(document.getElementById('gw-select').options[0]?.value) 
    ? totalFixtures 
    : (maxSubmitted || totalFixtures);

  document.getElementById('content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">GW${gw} submissions</div>
        <div class="panel-meta">${submittedCount} / ${PLAYERS.length} submitted</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${PLAYERS.map(name => {
        const hasAccount = Object.values(profileMap).includes(name);
        const count = submissionMap[name] || 0;
        const complete = count >= fixtureCount && fixtureCount > 0;
        const partial = count > 0 && !complete;

        let statusBadge;
        if (!hasAccount) {
          statusBadge = '<span class="b b-red">✗ No account</span>';
        } else if (complete) {
          statusBadge = `<span class="b b-green">✓ All ${count} submitted</span>`;
        } else if (partial) {
          statusBadge = `<span class="b b-amber">⚠ Partial · ${count}/${fixtureCount}</span>`;
        } else {
          statusBadge = '<span class="b b-red">✗ Not submitted</span>';
        }

        return `<div class="row">
          <div class="player-name">${name}</div>
          <div class="badges">${statusBadge}</div>
        </div>`;
      }).join('')}
    </div>`;
}

document.getElementById('pin').focus();
</script>
</body>
</html>
